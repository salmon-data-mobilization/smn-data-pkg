version: sdp-0.2.0
profile: https://dfo-pacific-science.github.io/smn-data-pkg/profiles/salmon-data-package/v0.2/profile.json
rules:
- id: codes_required_for_categorical_columns
  severity: error
  description: metadata/codes.csv is required when any column_dictionary.csv row has
    column_role equal to categorical.
- id: code_value_required_without_vocabulary_iri
  severity: error
  description: metadata/codes.csv code_value is required unless vocabulary_iri is
    provided.
- id: measurement_columns_require_iadopt_fields
  severity: error
  description: Measurement columns require unit_iri, term_iri, property_iri, and entity_iri.
- id: table_file_paths_exist
  severity: error
  description: Each metadata/tables.csv file_name value must be a safe relative path
    to an existing data file.
- id: column_dictionary_matches_data_headers
  severity: error
  description: metadata/column_dictionary.csv rows must match the headers of the data
    files referenced by metadata/tables.csv.
- id: datapackage_consistent_with_csv_metadata
  severity: error
  description: Published datapackage.json descriptors must agree with the canonical
    CSV metadata and referenced data files.
